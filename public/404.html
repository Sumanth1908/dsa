<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>DevRef</title>
    <script>
      // GitHub Pages SPA redirect.
      // Saves the full path to sessionStorage, then redirects to the app root.
      // The main index.html restores the path before React Router initialises.
      var path = window.location.pathname;
      sessionStorage.setItem('spa-redirect', path + window.location.search + window.location.hash);
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
